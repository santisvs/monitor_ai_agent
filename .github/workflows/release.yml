name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: electron:pack:win
            artifact: releases/jakite/jakite-agent-win.exe
          - os: macos-latest
            build_cmd: electron:pack:mac
            artifact: releases/jakite/jakite-agent-mac.dmg
          - os: ubuntu-latest
            build_cmd: electron:pack:linux
            artifact: releases/jakite/jakite-agent-linux.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run ${{ matrix.build_cmd }}
        env:
          BUILD_BRAND: jakite
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
