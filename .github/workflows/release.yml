name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: electron:pack:win
            artifact: releases/jakite/jakite-agent-win.exe
          - os: macos-latest
            build_cmd: electron:pack:mac
            artifact: releases/jakite/jakite-agent-mac.dmg
          - os: ubuntu-latest
            build_cmd: electron:pack:linux
            artifact: releases/jakite/jakite-agent-linux.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run ${{ matrix.build_cmd }}
        env:
          BUILD_BRAND: jakite
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload unsigned artifact for signing (Windows only)
        if: matrix.os == 'windows-latest'
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: jakite-agent-win-unsigned
          path: releases/jakite/jakite-agent-win.exe

      - name: Sign with SignPath (Windows only)
        if: matrix.os == 'windows-latest'
        id: signpath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: jakite-agent
          signing-policy-slug: release-signing
          artifact-configuration-slug: initial-version
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          wait-for-completion: true
          output-artifact-directory: releases/jakite/signed

      - name: Move signed artifact (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Move-Item releases/jakite/signed/jakite-agent-win.exe releases/jakite/jakite-agent-win.exe -Force

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
