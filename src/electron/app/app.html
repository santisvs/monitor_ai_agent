<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'unsafe-inline'; img-src 'self'">
  <title>Jakite Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc; color: #0f172a;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
      -webkit-user-select: none; user-select: none;
    }

    /* ── Drag region invisible ── */
    .titlebar {
      height: 0; flex-shrink: 0;
      -webkit-app-region: drag;
    }

    /* ── Body ── */
    .body { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Update banner ── */
    .update-banner {
      background: #fffbeb; border: 1px solid #fde68a;
      border-radius: 8px; padding: 8px 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .update-text { font-size: 12px; color: #92400e; }
    .btn-update {
      font-size: 11px; background: #f59e0b; color: #fff;
      border: none; border-radius: 5px; padding: 4px 10px; cursor: pointer; font-weight: 600; white-space: nowrap;
    }
    .btn-update:hover { background: #d97706; }

    /* ── API Key ── */
    .apikey-row {
      background: #ffffff; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; gap: 8px;
    }
    .apikey-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: .8px; font-weight: 700; flex-shrink: 0; }
    .apikey-value { flex: 1; font-size: 12px; color: #475569; font-family: 'Courier New', monospace; text-align: center; }
    .btn-show {
      font-size: 11px; background: transparent; color: #3b82f6;
      border: 1px solid #bfdbfe; border-radius: 5px; padding: 3px 8px; cursor: pointer; white-space: nowrap; font-weight: 600;
    }
    .btn-show:hover { background: #eff6ff; }

    /* ── Section label ── */
    .section-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }

    /* ── Last send card ── */
    .last-send-box {
      background: #ffffff; border: 1px solid #e2e8f0;
      border-radius: 8px; padding: 10px 14px;
    }
    .last-send-date { font-size: 14px; font-weight: 700; color: #0f172a; }
    .last-send-meta { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* ── Chart box ── */
    .chart-box {
      background: #ffffff; border: 1px solid #e2e8f0;
      border-radius: 10px; padding: 16px 14px 14px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    /* ── Multi-segment donut ── */
    .chart-wrap { position: relative; width: 130px; height: 130px; flex-shrink: 0; }
    .chart-wrap svg { width: 100%; height: 100%; }
    .chart-total {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .chart-total-num { font-size: 24px; font-weight: 800; color: #0f172a; line-height: 1; }
    .chart-total-sub { font-size: 10px; color: #94a3b8; margin-top: 2px; }
    .chart-total-empty { font-size: 11px; color: #cbd5e1; font-weight: 600; }

    /* ── Legend ── */
    .tool-legend { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-name { flex: 1; font-size: 11px; font-weight: 600; color: #334155; }
    .legend-pct {
      font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px;
    }
    .legend-sessions { font-size: 10px; color: #94a3b8; white-space: nowrap; }

    /* ── Next send ── */
    .next-send { font-size: 11px; color: #94a3b8; text-align: center; }
    .next-send span { color: #3b82f6; font-weight: 600; }

    /* ── Footer ── */
    .divider { height: 1px; background: #e2e8f0; flex-shrink: 0; }
    .footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px 12px; flex-shrink: 0; background: #ffffff; gap: 8px; }
    .footer-version { flex: 1; text-align: center; font-size: 11px; color: #94a3b8; font-weight: 500; }
    .btn-uninstall {
      font-size: 12px; background: transparent; color: #ef4444;
      border: 1px solid #fecaca; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: 500;
    }
    .btn-uninstall:hover { background: #fef2f2; }
    .btn-close {
      font-size: 12px; background: #f1f5f9; color: #475569;
      border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-weight: 500;
    }
    .btn-close:hover { background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="titlebar"></div>

  <div class="body">
    <div class="update-banner" id="update-banner" style="display:none">
      <span class="update-text">⚠ Nueva versión disponible: <strong id="latest-version-text"></strong></span>
      <button class="btn-update" id="btn-update">Descargar</button>
    </div>

    <div class="apikey-row">
      <span class="apikey-label">API Key</span>
      <span class="apikey-value" id="apikey-display">••••••••</span>
      <button class="btn-show" id="btn-show-key">Mostrar</button>
    </div>

    <div>
      <div class="section-label">Último envío</div>
      <div class="last-send-box">
        <div class="last-send-date" id="last-send-date">Sin envíos aún</div>
        <div class="last-send-meta" id="last-send-meta"></div>
      </div>
    </div>

    <div>
      <div class="section-label">Datos recopilados por herramienta</div>
      <div class="chart-box">
        <div class="chart-wrap" id="chart-wrap"></div>
        <div class="tool-legend" id="tool-legend"></div>
      </div>
    </div>

    <div class="next-send">Próximo envío: <span id="next-send-label">—</span></div>
  </div>

  <div class="divider"></div>
  <div class="footer">
    <button class="btn-uninstall" id="btn-uninstall">Desinstalar</button>
    <span class="footer-version" id="version-label">v—</span>
    <button class="btn-close" id="btn-close">Cerrar ×</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
